name: Topic improvement
description: Improve or extend a knowledge-base topic
title: "[Topic]: "
labels: ["topic-improvement"]
body:
  - type: input
    id: topic-path
    attributes:
      label: Topic path
      description: Paste the folder or file path.
      placeholder: "001. JavaScript Core/001.01 Language Fundamentals/001.01.01 Values and Types"
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Improvement
      description: What should be added or corrected?
    validations:
      required: true
  - type: textarea
    id: production-context
    attributes:
      label: Production context
      description: Include real-world behavior, failure modes, or trade-offs where useful.
